version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:7
    container_name: catdogkill-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: catdogkill
    volumes:
      - mongodb_data:/data/db
    networks:
      - catdogkill-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: catdogkill-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - catdogkill-network

  # 游戏服务器
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catdogkill-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/catdogkill?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-production-secret-key-change-this
    depends_on:
      - mongodb
      - redis
    networks:
      - catdogkill-network

volumes:
  mongodb_data:
  redis_data:

networks:
  catdogkill-network:
    driver: bridge
